name: Daily Academic Radar

on:
  schedule:
    # 08:30 Beijing/Japan time = 00:30 UTC.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: academic_radar

    env:
      PUBLIC_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
      NOTIFY_CHANNEL: ${{ secrets.NOTIFY_CHANNEL }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
      PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
                    sudo apt-get install -y fonts-wqy-microhei
          sudo mkdir -p /System/Library/Fonts/Supplemental
          sudo ln -sf /usr/share/fonts/truetype/wqy/wqy-microhei.ttc /System/Library/Fonts/Supplemental/Songti.ttc
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Run radar
        run: python scripts/run_daily.py

      - name: Upload digests and logs
        uses: actions/upload-artifact@v4
        with:
          name: academic-radar-output
          path: |
            academic_radar/output/digests/*.md
            academic_radar/output/digests/*.pdf
            academic_radar/output/logs/*.log

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: academic_radar/output/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
